//  CARREGAMENTO DE IMAGENS
// ══════════════════════════════════════════
const loaded = {};
const REMOVE_BLACK = [];
let loadCount = 0;
const totalImgs = Object.keys(IMG).length;

function removeBlack(img, thresh=55){
  const oc = document.createElement('canvas');
  oc.width = img.naturalWidth; oc.height = img.naturalHeight;
  const ox = oc.getContext('2d');
  ox.drawImage(img,0,0);
  const id = ox.getImageData(0,0,oc.width,oc.height);
  const d  = id.data;
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    if(r<thresh && g<thresh && b<thresh){ d[i+3]=0; continue; }
    const brightness=(r+g+b)/3;
    if(brightness<thresh*2.2){
      const sat=Math.max(r,g,b)-Math.min(r,g,b);
      if(sat<30) d[i+3]=Math.round((brightness/(thresh*2.2))*255);
    }
  }
  ox.putImageData(id,0,0);
  return oc;
}

Object.entries(IMG).forEach(([k,src])=>{
  const im = new Image();
  im.onload = ()=>{
    loaded[k] = REMOVE_BLACK.includes(k) ? removeBlack(im) : im;
    if(++loadCount >= totalImgs) gameInit();
  };
  im.onerror = ()=>{
    loaded[k] = null;
    if(++loadCount >= totalImgs) gameInit();
  };

});
setTimeout(()=>{ if(loadCount<totalImgs){ loadCount=totalImgs; gameInit(); } }, 10000);

// ══════════════════════════════════════════

// ══════════════════════════════════════════
const SB_HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer '+SUPABASE_KEY,
  'Content-Type': 'application/json'
};

function getRankingLocal(){ try{return JSON.parse(localStorage.getItem('csf_rank')||'[]');}catch(e){return[];} }
function saveRankingLocal(r){ try{localStorage.setItem('csf_rank',JSON.stringify(r));}catch(e){} }

async function fetchScores(){
  try{
    const res = await fetch(SUPABASE_URL+'/rest/v1/scores?select=name,dist,coins&order=dist.desc&limit=20',{headers:SB_HEADERS});
    if(!res.ok) throw new Error();
    return await res.json();
  }catch(e){ return getRankingLocal(); }
}

async function postScore(name,dist,coins){
  const entry = {name:name.toUpperCase().slice(0,16), dist:Math.floor(dist), coins};
  const r = getRankingLocal();
  r.push(entry); r.sort((a,b)=>b.dist-a.dist); saveRankingLocal(r.slice(0,20));
  try{
    await fetch(SUPABASE_URL+'/rest/v1/scores',{
      method:'POST',
      headers:{...SB_HEADERS,'Prefer':'return=minimal'},
      body:JSON.stringify(entry)
    });
  }catch(e){}
}

// ══════════════════════════════════════════
//  RECTS DOS BOTÕES (coordenadas do canvas)
// ══════════════════════════════════════════
// Tela inicial
const TBTN = {
  choose:  {x:200, y:240, w:400, h:38},
  ranking: {x:250, y:286, w:300, h:38},
  start:   {x:250, y:332, w:300, h:38},
};
// Game over
const GOBTN = {
  restart: {x:185, y:272, w:430, h:36},
  choose:  {x:185, y:316, w:430, h:36},
};
// Seleção de personagem — grade 4×2
const CS_COLS=4, CS_ROWS=2;
const CS_MX=10, CS_MY=34, CS_GAP=8;
const CS_CW=Math.floor((GW-CS_MX*2-CS_GAP*(CS_COLS-1))/CS_COLS);
const CS_CH=Math.floor((GH-CS_MY-8-CS_GAP*(CS_ROWS-1))/CS_ROWS);
function csRect(idx){
  const col=idx%CS_COLS, row=Math.floor(idx/CS_COLS);
  return {x:CS_MX+col*(CS_CW+CS_GAP), y:CS_MY+row*(CS_CH+CS_GAP), w:CS_CW, h:CS_CH};
}

// ══════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════
function inRect(px,py,r){ return px>=r.x&&px<=r.x+r.w&&py>=r.y&&py<=r.y+r.h; }

function handleTap(gx,gy){
  if(state==='title'){
    if(inRect(gx,gy,TBTN.choose)){ state='charselect'; return; }
    if(inRect(gx,gy,TBTN.ranking)){ showRanking(); return; }
    if(inRect(gx,gy,TBTN.start)){
      const pool=CHARACTERS.filter(c=>c.id!==activeChar.id);
      resetGame(pool[Math.floor(Math.random()*pool.length)]); return;
    }
    return;
  }
  if(state==='charselect'){
    // botão voltar (canto superior esquerdo)
    if(gx<80&&gy<28){ state='title'; return; }
    for(let i=0;i<CHARACTERS.length;i++){
      if(inRect(gx,gy,csRect(i))){ resetGame(CHARACTERS[i]); return; }
    }
    return;
  }
  if(state==='playing'){
    if(!player.jumping&&!player.dead){ player.vy=JUMP_VY; player.jumping=true; }
    return;
  }
  if(state==='paused'){ togglePause(); return; }
  if(state==='gameover'){
    if(inRect(gx,gy,GOBTN.choose)){ state='charselect'; return; }
    resetGame(); // toque fora = jogar novamente com mesmo personagem
    return;
  }
}

function togglePause(){
  if(state==='playing'){
    state='paused'; gamePaused=true;
    document.getElementById('pauseBtn').textContent='▶';
  } else if(state==='paused'){
    state='playing'; gamePaused=false;
    document.getElementById('pauseBtn').textContent='⏸';
  }
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){
    e.preventDefault();
    if(state==='title'){ const pool=CHARACTERS.filter(c=>c.id!==activeChar.id); resetGame(pool[Math.floor(Math.random()*pool.length)]); return; }
    if(state==='gameover'){ resetGame(); return; }
    if(state==='paused'){ togglePause(); return; }
    if(state==='playing'&&!player.jumping&&!player.dead){ player.vy=JUMP_VY; player.jumping=true; }
  }
  if(e.code==='KeyP'||e.code==='Escape') togglePause();
  if(e.code==='KeyR') showRanking();
});

canvas.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const gx=(e.clientX-rect.left)/SCALE;
  const gy=(e.clientY-rect.top)/SCALE;
  handleTap(gx,gy);
},{passive:false});

document.getElementById('pauseBtn').addEventListener('click',e=>{e.stopPropagation();togglePause();});

// ── Mobile fullscreen + orientação ──────────────────
(function(){
  const isMobile='ontouchstart'in window||navigator.maxTouchPoints>0;
  const btn=document.getElementById('fsBtn');
  if(!isMobile||!btn) return;
  btn.style.display='flex';
  function isFs(){return !!(document.fullscreenElement||document.webkitFullscreenElement);}
  function updateBtn(){
    btn.textContent=isFs()?'✕':'⛶';
    btn.title=isFs()?'Sair da tela cheia':'Tela cheia';
  }
  async function toggleFs(){
    try{
      if(!isFs()){
        const el=document.documentElement;
        if(el.requestFullscreen) await el.requestFullscreen();
        else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        if(screen.orientation&&screen.orientation.lock)
          await screen.orientation.lock('landscape').catch(()=>{});
      }else{
        if(document.exitFullscreen) await document.exitFullscreen();
        else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
        if(screen.orientation&&screen.orientation.unlock) screen.orientation.unlock();
      }
    }catch(e){}
    updateBtn();
  }
  document.addEventListener('fullscreenchange',updateBtn);
  document.addEventListener('webkitfullscreenchange',updateBtn);
  btn.addEventListener('click',e=>{e.stopPropagation();toggleFs();});
})();

// ══════════════════════════════════════════
//  OBSTÁCULOS / ITENS

const OBS_TYPES={
  cone: {w:40,h:56},
  pedra:{w:60,h:40},
  buraco:{w:88,h:22},
};
function spawnObs(){
  const types=Object.keys(OBS_TYPES);
  const t=types[Math.floor(Math.random()*types.length)];
  const d=OBS_TYPES[t];
  obstacles.push({type:t,x:GW+20,y:GROUND_Y-d.h+(t==='buraco'?3:0),w:d.w,h:d.h});
}
function spawnCoins(){
  if(obstacles.some(o=>o.x>GW-60&&o.x<GW+250)){coinTimer=35;return;}
  const high=Math.random()<0.3;
  const y=high?GROUND_Y-145:GROUND_Y-65;
  const n=Math.random()<0.4?3:1;
  for(let i=0;i<n;i++) coins.push({x:GW+20+i*40,y,w:26,h:26});
}
function spawnBuster(){
  if(obstacles.some(o=>o.x>GW-80)){busterPickupTimer=120;return;}
  busterPickups.push({x:GW+20,y:GROUND_Y-98,w:38,h:48});
}
function spawnPickup(){
  if(obstacles.some(o=>o.x>GW-80)){pickupTimer=150;return;}
  pickups.push({x:GW+20,y:GROUND_Y-90,w:40,h:48});
}

// ══════════════════════════════════════════
//  COLISÃO
// ══════════════════════════════════════════
function pRect(){return{x:player.x-COL_W/2+6,y:player.y-COL_H,w:COL_W-6,h:COL_H};}
function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function fx(x,y,t,c){fxList.push({x,y,t,c,life:50,vy:-1.1});}

// ══════════════════════════════════════════
//  UPDATE
// ══════════════════════════════════════════
function update(){
  frame++;
  if(state==='playing'&&!gamePaused) updateGame();
}

function updateGame(){
  speed=Math.min(5.5+Math.floor(distance/500)*0.8,18)+(hasBuster?busterSpeedBonus:0);
  distance+=speed*0.09;

  if(!player.dead){
    player.vy+=GRAVITY; player.y+=player.vy;
    if(player.y>=GROUND_Y){player.y=GROUND_Y;player.vy=0;player.jumping=false;}

    player.ft++;
    const fps=Math.min(6+Math.floor(speed),14);
    if(player.ft>=Math.round(60/fps)){player.ft=0;player.fr=(player.fr+1)%8;}

    if(hasShield){shieldTimer--;if(shieldTimer<=0)hasShield=false;}
    if(invTimer>0) invTimer--;
    if(hasBuster){busterTimer--;if(busterTimer<=0){hasBuster=false;busterSpeedBonus=0;}}
    if(balloonTimer>0) balloonTimer--;
    else balloon=false;

    obsTimer--;
    if(obsTimer<=0){spawnObs();obsTimer=Math.max(42,88-Math.floor(distance/450)*5)+Math.floor(Math.random()*25);}
    coinTimer--;
    if(coinTimer<=0){spawnCoins();coinTimer=40+Math.floor(Math.random()*25);}
    pickupTimer--;
    if(pickupTimer<=0){spawnPickup();pickupTimer=280+Math.floor(Math.random()*200);}
    busterPickupTimer--;
    if(busterPickupTimer<=0){spawnBuster();busterPickupTimer=350+Math.floor(Math.random()*180);}
  } else {
    deathTimer++;
    if(deathTimer===45&&!nameAsked){nameAsked=true;askName(distance,coinsCount);}
    if(deathTimer>160) state='gameover';
  }

  const sp=speed;
  obstacles.forEach(o=>o.x-=sp); coins.forEach(c=>c.x-=sp);
  pickups.forEach(p=>p.x-=sp); busterPickups.forEach(b=>b.x-=sp);
  obstacles=obstacles.filter(o=>o.x>-120);
  coins=coins.filter(c=>c.x>-60);
  pickups=pickups.filter(p=>p.x>-60);
  busterPickups=busterPickups.filter(b=>b.x>-60);
  fxList.forEach(f=>{f.y+=f.vy;f.life--;});
  fxList=fxList.filter(f=>f.life>0);

  bgX-=sp*0.3;
  const ci=loaded.cidade;
  if(ci){
    const ih=ci.naturalHeight||953, iw=ci.naturalWidth||4832;
    const dw=iw*(GH/ih);
    if(bgX<-dw) bgX+=dw;
  }

  if(player.dead) return;
  const pr=pRect();
  for(const o of obstacles){
    if(invTimer>0) continue;
    if(hit(pr,{x:o.x,y:o.y,w:o.w,h:o.h})){
      if(hasShield){
        hasShield=false;shieldTimer=0;
        obstacles=obstacles.filter(x=>x!==o);
        fx(o.x+o.w/2,o.y-20,'BLOQUEADO!','#0ff');
      } else if(invTimer<=0){
        lives--;invTimer=110;
        fx(player.x,player.y-60,'-1 ♥','#ff4444');
        if(lives<=0) player.dead=true;
      }
      break;
    }
  }
  coins=coins.filter(c=>{
    if(hit(pr,{x:c.x,y:c.y,w:c.w,h:c.h})){coinsCount++;fx(c.x,c.y-10,'+moeda','#FFD700');return false;}
    return true;
  });
  pickups=pickups.filter(p=>{
    if(hit(pr,{x:p.x,y:p.y,w:p.w,h:p.h})){hasShield=true;shieldTimer=300;fx(p.x,p.y-20,'ESCUDO!','#0ff');return false;}
    return true;
  });
  busterPickups=busterPickups.filter(b=>{
    if(hit(pr,{x:b.x,y:b.y,w:b.w,h:b.h})){
      hasBuster=true;busterTimer=240;busterSpeedBonus=3.5;
      balloon=true;balloonTimer=180;
      fx(b.x,b.y-20,'TURBO!','#FFD700');
      return false;
    }
    return true;
  });
}

// ══════════════════════════════════════════
//  DESENHO — BACKGROUNDS
// ══════════════════════════════════════════
function drawBG(scrollX){
  const ci=loaded.cidade;
  if(!ci){ctx.fillStyle='#5ab0ea';ctx.fillRect(0,0,GW,GH);return;}
  const ih=ci.naturalHeight||953, iw=ci.naturalWidth||4832;
  const sc=GH/ih, dw=iw*sc;
  let x=scrollX;
  if(x>0) x-=dw;
  while(x<GW){ctx.drawImage(ci,x,0,dw,GH);x+=dw;}
}

function drawTitleBG(){
  const im=loaded.inicio;
  if(!im){ctx.fillStyle='#1a3060';ctx.fillRect(0,0,GW,GH);return;}
  const ih=im.naturalHeight||954, iw=im.naturalWidth||2442;
  ctx.drawImage(im,0,0,iw*(GH/ih),GH);
}

// ══════════════════════════════════════════
//  DESENHO — PERSONAGEM
// ══════════════════════════════════════════
function drawPlayer(){
  const n=(player.fr+1)<10?'0'+(player.fr+1):''+(player.fr+1);
  const im=loaded[activeChar.id+'_f'+n];
  if(!im) return;

  ctx.save();
  if((player.dead||invTimer>0)&&frame%5<2) ctx.globalAlpha=0.15;

  const dy=player.y-CHAR_H;
  if(hasBuster){
    for(let t=1;t<=3;t++){
      ctx.save();ctx.globalAlpha=0.15*(4-t);
      ctx.drawImage(im,player.x-CHAR_W/2-t*14,dy,CHAR_W,CHAR_H);
      ctx.restore();
    }
  }
  ctx.drawImage(im,player.x-CHAR_W/2,dy,CHAR_W,CHAR_H);

  if(hasShield){
    const ef=loaded.efeito;
    const pulse=1+Math.sin(frame*0.15)*0.1;
    const sz=110*pulse;
    ctx.globalAlpha=(0.5+Math.sin(frame*0.12)*0.18);
    if(ef) ctx.drawImage(ef,player.x-sz/2,player.y-CHAR_H*0.5-sz/2,sz,sz);
    else{ctx.strokeStyle='#0ff';ctx.lineWidth=3;ctx.beginPath();ctx.arc(player.x,player.y-CHAR_H/2,52,0,Math.PI*2);ctx.stroke();}
  }

  if(balloon&&balloonTimer>0){
    const ba=loaded[activeChar.id+'_bal'];
    if(ba){
      const alpha=Math.min(1,balloonTimer/20);
      const scale=balloonTimer>160?1:0.85+0.15*(balloonTimer/160);
      const bw=120*scale, bh=63*scale;
      ctx.save();ctx.globalAlpha=alpha;
      ctx.drawImage(ba,player.x-bw*0.25,player.y-CHAR_H-bh-6,bw,bh);
      ctx.restore();
    }
  }
  ctx.restore();
}

// ══════════════════════════════════════════
//  DESENHO — OBSTÁCULOS / MOEDAS / ITENS
// ══════════════════════════════════════════
function drawObs(){
  for(const o of obstacles){
    const im=loaded[o.type];
    if(im) ctx.drawImage(im,o.x,o.y,o.w,o.h);
    else{ctx.fillStyle='#e55';ctx.fillRect(o.x,o.y,o.w,o.h);}
  }
}
function drawCoins(){
  const mi=loaded.moeda;
  for(const c of coins){
    const bob=Math.sin(frame*0.12+c.x*0.04)*3;
    if(mi) ctx.drawImage(mi,c.x,c.y+bob,c.w,c.h);
    else{ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(c.x+13,c.y+13+bob,12,0,Math.PI*2);ctx.fill();}
  }
}
function drawPickups(){
  const si=loaded.escudo;
  for(const p of pickups){
    const bob=Math.sin(frame*0.1)*5;
    ctx.save();ctx.shadowColor='#0ff';ctx.shadowBlur=20;
    if(si) ctx.drawImage(si,p.x,p.y+bob,p.w,p.h);
    ctx.restore();
  }
  const bi=loaded.buster;
  for(const b of busterPickups){
    const bob=Math.sin(frame*0.13+b.x*0.03)*5;
    const pulse=0.88+Math.sin(frame*0.18)*0.12;
    ctx.save();ctx.shadowColor='#FFD700';ctx.shadowBlur=22;ctx.globalAlpha=pulse;
    if(bi) ctx.drawImage(bi,b.x,b.y+bob,b.w,b.h);
    else{ctx.fillStyle='#FFD700';ctx.fillRect(b.x,b.y+bob,b.w,b.h);}
    ctx.restore();
  }
}

// ══════════════════════════════════════════
//  DESENHO — HUD
// ══════════════════════════════════════════
function drawHUD(){
  const qi=loaded.quadro;
  const qw=128,qh=44,qx=6,qy=4;
  if(qi){ctx.save();ctx.globalAlpha=0.88;ctx.drawImage(qi,qx,qy,qw,qh);ctx.restore();}
  else{ctx.save();ctx.fillStyle='rgba(40,40,60,0.75)';ctx.beginPath();ctx.roundRect(qx,qy,qw,qh,10);ctx.fill();ctx.restore();}

  const li=loaded.life;
  for(let i=0;i<3;i++){
    const hx=qx+10+i*38, hy=qy+5;
    if(li){
      ctx.save();if(i>=lives) ctx.globalAlpha=0.2;
      const pulse=(lives===1&&i===0)?(1+Math.sin(frame*0.2)*0.13):1;
      const hw=30*pulse,hh=30*pulse;
      ctx.drawImage(li,hx-(hw-30)/2,hy-(hh-30)/2,hw,hh);ctx.restore();
    }else{
      ctx.fillStyle=i<lives?'#f33':'rgba(255,50,50,0.2)';
      ctx.font='22px monospace';ctx.textAlign='left';ctx.fillText('❤',hx,hy+22);
    }
  }

  ctx.save();
  ctx.font='bold 17px monospace';ctx.textAlign='center';
  ctx.shadowColor='#000';ctx.shadowBlur=5;ctx.fillStyle='#fff';
  ctx.fillText('📦 '+Math.floor(distance)+'m',GW/2,24);
  ctx.restore();

  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.45)';ctx.beginPath();ctx.roundRect(GW-118,4,108,32,8);ctx.fill();
  ctx.textAlign='right';ctx.font='bold 15px monospace';
  const mi=loaded.moeda;if(mi) ctx.drawImage(mi,GW-116,7,20,22);
  ctx.fillStyle='#FFD700';ctx.shadowColor='#000';ctx.shadowBlur=3;
  ctx.fillText(coinsCount,GW-12,24);ctx.restore();

  const baseSpeed=5.5+Math.floor(distance/500)*0.8;
  const lvl=Math.max(1,Math.floor((baseSpeed-5.5)/0.8)+1);
  if(lvl>1){
    ctx.save();ctx.font='bold 12px monospace';ctx.textAlign='center';
    ctx.fillStyle=lvl>6?'#ff4':lvl>3?'#fa0':'#aff';
    ctx.shadowColor='#000';ctx.shadowBlur=3;
    ctx.fillText('VEL '+lvl+'x ⚡',GW/2,42);ctx.restore();
  }

  let barY=50;
  if(hasShield){
    const pct=shieldTimer/300;
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.beginPath();ctx.roundRect(8,barY,128,10,4);ctx.fill();
    const g1=ctx.createLinearGradient(8,0,136,0);
    g1.addColorStop(0,'#0ff');g1.addColorStop(1,'#008fff');
    ctx.fillStyle=g1;ctx.beginPath();ctx.roundRect(8,barY,128*pct,10,4);ctx.fill();
    ctx.strokeStyle='rgba(0,255,255,0.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(8,barY,128,10,4);ctx.stroke();
    ctx.font='10px monospace';ctx.fillStyle='#0ff';ctx.textAlign='left';
    ctx.fillText('🛡 ESCUDO',8,barY+22);ctx.restore();
    barY+=28;
  }
  if(hasBuster){
    const pct=busterTimer/240;
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.beginPath();ctx.roundRect(8,barY,128,10,4);ctx.fill();
    const g2=ctx.createLinearGradient(8,0,136,0);
    g2.addColorStop(0,'#FFD700');g2.addColorStop(1,'#ff8800');
    ctx.fillStyle=g2;ctx.beginPath();ctx.roundRect(8,barY,128*pct,10,4);ctx.fill();
    ctx.strokeStyle='rgba(255,200,0,0.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(8,barY,128,10,4);ctx.stroke();
    ctx.font='10px monospace';ctx.fillStyle='#FFD700';ctx.textAlign='left';
    ctx.fillText('⚡ TURBO',8,barY+22);ctx.restore();
  }

  for(const f of fxList){
    ctx.save();ctx.globalAlpha=f.life/50;
    ctx.font='bold 14px monospace';ctx.textAlign='center';
    ctx.shadowColor='#000';ctx.shadowBlur=3;
    ctx.fillStyle=f.c;ctx.fillText(f.t,f.x,f.y);ctx.restore();
  }
}

// ══════════════════════════════════════════
//  UTIL — botão genérico e rrect
// ══════════════════════════════════════════
function drawBtn(r, label, bgColor){
  ctx.save();
  ctx.fillStyle=bgColor||'rgba(10,30,120,.9)';
  ctx.beginPath();ctx.roundRect(r.x,r.y,r.w,r.h,10);ctx.fill();
  ctx.strokeStyle='rgba(80,160,255,.65)';ctx.lineWidth=2;ctx.stroke();
  ctx.font='bold 14px monospace';ctx.textAlign='center';
  ctx.fillStyle='#fff';ctx.shadowColor='#000';ctx.shadowBlur=4;
  ctx.fillText(label,r.x+r.w/2,r.y+r.h*0.66);
  ctx.restore();
}

function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ══════════════════════════════════════════
//  DESENHO — TELA INICIAL
// ══════════════════════════════════════════
function drawTitle(){
  drawTitleBG();
  const gr=ctx.createLinearGradient(0,GH*0.42,0,GH);
  gr.addColorStop(0,'rgba(0,5,20,0)');
  gr.addColorStop(1,'rgba(0,5,20,0.84)');
  ctx.fillStyle=gr;ctx.fillRect(0,0,GW,GH);

  const ti=loaded.titulo;
  if(ti){
    const tw=ti.width||ti.naturalWidth||780, th=ti.height||ti.naturalHeight||376;
    const sc=Math.min(GW*0.82/tw,GH*0.52/th);
    ctx.drawImage(ti,GW/2-(tw*sc)/2,10,tw*sc,th*sc);
  }

  // painel
  ctx.save();
  ctx.fillStyle='rgba(0,8,50,.88)';
  rrect(GW/2-225,224,450,146,14);ctx.fill();
  ctx.strokeStyle='rgba(30,140,255,.55)';ctx.lineWidth=2;ctx.stroke();
  ctx.restore();

  if(topScore){
    ctx.save();
    ctx.font='bold 11px monospace';ctx.textAlign='center';
    ctx.fillStyle='#ffd700';ctx.shadowColor='#000';ctx.shadowBlur=3;
    ctx.fillText('🏆 '+topScore.name+' — '+topScore.dist+'m  🪙'+topScore.coins,GW/2,238);
    ctx.restore();
  }

  drawBtn(TBTN.choose, '👤  ESCOLHA SEU ENTREGADOR', 'rgba(10,30,150,.92)');
  drawBtn(TBTN.ranking,'🏆  RANKING',                'rgba(90,60,0,.92)');
  drawBtn(TBTN.start,  '▶  INICIAR',                 'rgba(0,80,10,.92)');
}

// ══════════════════════════════════════════
//  DESENHO — SELEÇÃO DE PERSONAGEM
// ══════════════════════════════════════════
function drawCharSelect(){
  drawTitleBG();
  ctx.fillStyle='rgba(0,5,25,.80)';ctx.fillRect(0,0,GW,GH);

  // título
  ctx.save();
  ctx.font='bold 16px monospace';ctx.textAlign='center';
  ctx.fillStyle='#FFD700';ctx.shadowColor='#FFD700';ctx.shadowBlur=8;
  ctx.fillText('👤  ESCOLHA SEU ENTREGADOR',GW/2,22);
  ctx.restore();

  // botão voltar
  ctx.save();
  ctx.fillStyle='rgba(20,20,70,.85)';ctx.beginPath();ctx.roundRect(4,4,74,22,6);ctx.fill();
  ctx.strokeStyle='rgba(80,120,255,.45)';ctx.lineWidth=1;ctx.stroke();
  ctx.font='11px monospace';ctx.textAlign='center';
  ctx.fillStyle='#adf';ctx.fillText('← VOLTAR',41,17);
  ctx.restore();

  // cards
  CHARACTERS.forEach((c,i)=>{
    const r=csRect(i);
    const isActive=(c.id===activeChar.id);

    // fundo do card
    ctx.save();
    ctx.fillStyle=isActive?'rgba(15,50,180,.92)':'rgba(8,18,60,.88)';
    ctx.beginPath();ctx.roundRect(r.x,r.y,r.w,r.h,8);ctx.fill();
    ctx.strokeStyle=isActive?'#FFD700':'rgba(50,110,255,.5)';
    ctx.lineWidth=isActive?2.5:1.5;ctx.stroke();
    ctx.restore();

    // imagem do card (clipada com bordas arredondadas)
    const nameH=18;
    const imgH=r.h-nameH;
    const img=loaded[c.id+'_card'];
    if(img){
      ctx.save();
      ctx.beginPath();ctx.roundRect(r.x+2,r.y+2,r.w-4,imgH-2,6);ctx.clip();
      ctx.drawImage(img,r.x+2,r.y+2,r.w-4,imgH-2);
      ctx.restore();
    } else {
      ctx.fillStyle='#223';ctx.fillRect(r.x+2,r.y+2,r.w-4,imgH-2);
    }

    // nome
    ctx.save();
    ctx.font='bold 11px monospace';ctx.textAlign='center';
    ctx.fillStyle=isActive?'#FFD700':'#ddd';
    ctx.shadowColor='#000';ctx.shadowBlur=3;
    ctx.fillText(c.name,r.x+r.w/2,r.y+r.h-4);
    ctx.restore();

    // estrela no personagem ativo
    if(isActive){
      ctx.save();ctx.font='11px monospace';ctx.textAlign='right';
      ctx.fillStyle='#FFD700';ctx.fillText('★',r.x+r.w-4,r.y+13);
      ctx.restore();
    }
  });
}

// ══════════════════════════════════════════
//  DESENHO — GAME OVER
// ══════════════════════════════════════════
function drawGameOver(){
  drawBG(bgX);
  ctx.fillStyle='rgba(0,0,15,.75)';ctx.fillRect(0,0,GW,GH);

  ctx.save();
  ctx.fillStyle='rgba(5,8,55,.94)';
  rrect(GW/2-215,38,430,300,18);ctx.fill();
  ctx.strokeStyle='#cc4411';ctx.lineWidth=2;ctx.stroke();

  ctx.textAlign='center';
  ctx.font='bold 24px monospace';ctx.fillStyle='#ff6655';
  ctx.shadowColor='#f00';ctx.shadowBlur=14;
  ctx.fillText('ENTREGA FINALIZADA!',GW/2,74);
  ctx.shadowBlur=0;

  const top=getRankingLocal();
  const best=topScore?topScore.dist:(top.length?top[0].dist:0);
  ctx.font='16px monospace';ctx.fillStyle='#eee';
  ctx.fillText('📦 '+Math.floor(distance)+'m percorridos',GW/2,108);
  ctx.fillText('🪙 '+coinsCount+' moedas',GW/2,132);

  if(distance>=best&&distance>0){
    ctx.font='bold 14px monospace';ctx.fillStyle='#FFD700';
    ctx.shadowColor='#FFD700';ctx.shadowBlur=10;
    ctx.fillText('🏆 NOVO RECORDE!',GW/2,160);
    ctx.shadowBlur=0;
  } else if(best>0){
    ctx.font='12px monospace';ctx.fillStyle='#aaa';
    ctx.fillText('Recorde: '+best+'m por '+(top[0].name||''),GW/2,160);
  }

  ctx.font='11px monospace';ctx.fillStyle='rgba(160,200,255,.65)';
  ctx.fillText('R → ranking completo',GW/2,186);
  ctx.restore();

  drawBtn(GOBTN.restart,'▶  JOGAR NOVAMENTE',         'rgba(0,80,10,.92)');
  drawBtn(GOBTN.choose, '👤  ESCOLHER OUTRO ENTREGADOR','rgba(10,30,150,.92)');
}

// ══════════════════════════════════════════
//  DESENHO — PAUSA
// ══════════════════════════════════════════
function drawPause(){
  ctx.save();
  ctx.fillStyle='rgba(0,0,20,.7)';ctx.fillRect(0,0,GW,GH);
  rrect(GW/2-140,GH/2-55,280,112,14);
  ctx.fillStyle='rgba(0,15,70,.95)';ctx.fill();
  ctx.strokeStyle='rgba(50,140,255,.8)';ctx.lineWidth=2;ctx.stroke();
  ctx.textAlign='center';ctx.font='bold 28px monospace';ctx.fillStyle='#fff';
  ctx.fillText('⏸  PAUSADO',GW/2,GH/2-6);
  ctx.font='13px monospace';ctx.fillStyle='#adf';
  ctx.fillText('ESPAÇO / P / ESC para continuar',GW/2,GH/2+26);
  ctx.restore();
}

// ══════════════════════════════════════════
//  LOOP PRINCIPAL
// ══════════════════════════════════════════
function draw(){
  ctx.clearRect(0,0,GW,GH);
  if(state==='title')     { drawTitle();     return; }
  if(state==='charselect'){ drawCharSelect();return; }
  if(state==='gameover')  { drawGameOver();  return; }
  drawBG(bgX);
  drawPickups();drawCoins();drawObs();drawPlayer();drawHUD();
  if(state==='paused') drawPause();
}

function loop(){update();draw();requestAnimationFrame(loop);}

let topScore = null;
async function loadTopScore(){
  const r = await fetchScores();
  topScore = r.length ? r[0] : null;
}

function gameInit(){
  document.getElementById('pauseBtn').style.display='none';
  loadTopScore();
  loop();
}
</script>
